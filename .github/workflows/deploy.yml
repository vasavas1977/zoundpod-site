name: Deploy to Cloudflare Pages

# Auto-deploy the ZOUND Pod site to Cloudflare Pages on every push to main.
# Requires one repo secret: CLOUDFLARE_API_TOKEN  (Account > Cloudflare Pages > Edit)
# The account ID below is not sensitive (it appears in dashboard URLs).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: e11b825384f19f5858edb396c827f897
          command: pages deploy . --project-name=zoundpod --branch=main
